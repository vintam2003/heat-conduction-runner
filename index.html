<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heat Conduction Runner</title>
<style>
  :root{
    --bg1:#091033;
    --bg2:#1a2c73;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:16px;
  }
  .shell{
    width:min(1280px, 98vw);
    overflow:hidden;
    border-radius:26px;
    border:4px solid #111a58;
    box-shadow:0 18px 50px rgba(0,0,0,.35);
    background:#b9ddff;
  }
  canvas{display:block;width:100%;height:auto;background:#b9ddff}
</style>
</head>
<body>
<div class="shell">
  <canvas id="game" width="1280" height="560"></canvas>
</div>

<audio id="bgMusic" loop>
  <source src="gamemusic.mp3" type="audio/mpeg">
</audio>

<audio id="overflowSound">
  <source src="overflow.mp3" type="audio/mpeg">
</audio>

<audio id="winSound">
  <source src="win.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const bgMusic = document.getElementById('bgMusic');
const overflowSound = document.getElementById('overflowSound');
const winSound = document.getElementById('winSound');

bgMusic.volume = 0.3;
overflowSound.volume = 0.8;
winSound.volume = 0.8;


bgMusic.addEventListener('ended', () => {
  bgMusic.currentTime = 0;
  bgMusic.play().catch(()=>{});
});

const state = {
  screen:'intro',
  selected:1,
  N:10,
  q:2.0,
  beta:1.5,
  T0:10,
  progress:0,
  worldLength:3200,
  groundY:420,
  cameraX:0,
  runnerX:120,
  dead:false,
  finish:false,
  status:'Press Enter to start.'
};

function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

function startMusic(){
  overflowSound.pause();
  winSound.pause();
  overflowSound.currentTime = 0;
  winSound.currentTime = 0;
  bgMusic.currentTime = 0;
  bgMusic.play().catch(()=>{});
}

function stopMusic(){
  bgMusic.pause();
  bgMusic.currentTime = 0;
}

function playOverflow(){
  stopMusic();
  overflowSound.currentTime = 0;
  overflowSound.play().catch(()=>{});
}

function playWin(){
  stopMusic();
  winSound.currentTime = 0;
  winSound.play().catch(()=>{});
}

function resetGame(){
  state.screen='intro';
  state.selected=1;
  state.N=10;
  state.q=2.0;
  state.beta=1.5;
  state.T0=10;
  state.progress=0;
  state.cameraX=0;
  state.runnerX=120;
  state.dead=false;
  state.finish=false;
  state.status='Press Enter to start.';
}

function overflow(){ return state.N > 15; }

function speedFactor(){
  const err = Math.abs(state.N-10)*0.18 + Math.abs(state.q-2.0)*0.55 + Math.abs(state.beta-1.5)*0.65 + Math.abs(state.T0-10)*0.12;
  return Math.max(0.25, 3.4 - err);
}

function fitLabel(){
  const s = speedFactor();
  if (s > 2.8) return 'Stable';
  if (s > 1.7) return 'Less Stable';
  if (s > 0.8) return 'Unstable';
  return 'Very Unstable';
}

function fitColor(){
  const s = speedFactor();
  if (overflow()) return '#ff7a7a';
  if (s > 2.8) return '#8fffad';
  if (s > 1.9) return '#ffd96a';
  if (s > 1.1) return '#ffb27a';
  return '#ff8a8a';
}

function adjust(dir){
  if(state.screen==='dead' || state.screen==='win') return;
  if(state.selected===1) state.N = clamp(state.N + dir, 4, 20);
  if(state.selected===2) state.q = clamp(Math.round((state.q + 0.5*dir)*10)/10, 0, 6);
  if(state.selected===3) state.beta = clamp(Math.round((state.beta + 0.5*dir)*10)/10, 0, 5);
  if(state.selected===4) state.T0 = clamp(state.T0 + dir, 0, 20);
}

window.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    if(state.screen==='intro'){
      state.screen='playing';
      state.status='Runner moving. Adjust the parameters.';
      startMusic();
    }
  } else if(e.key.toLowerCase()==='r'){
    resetGame();
    state.screen='playing';
    state.status='Runner moving. Adjust the parameters.';
    startMusic();
  } else if(['1','2','3','4'].includes(e.key)){
    state.selected = Number(e.key);
  } else if(e.key === 'ArrowRight'){
    e.preventDefault();
    adjust(1);
  } else if(e.key === 'ArrowLeft'){
    e.preventDefault();
    adjust(-1);
  }
});

function drawCloud(x,y,s){
  ctx.fillStyle='rgba(255,255,255,.94)';
  ctx.beginPath();
  ctx.arc(x,y,24*s,0,Math.PI*2);
  ctx.arc(x+30*s,y-10*s,28*s,0,Math.PI*2);
  ctx.arc(x+68*s,y,22*s,0,Math.PI*2);
  ctx.fill();
}

function drawRunner(x,y,dead){
  if(dead){
    ctx.strokeStyle='#181818';
    ctx.lineWidth=5;
    ctx.beginPath();
    ctx.arc(x+18,y+14,11,0,Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+18,y+26); ctx.lineTo(x+18,y+54);
    ctx.moveTo(x+6,y+38); ctx.lineTo(x+30,y+38);
    ctx.moveTo(x+18,y+54); ctx.lineTo(x+6,y+68);
    ctx.moveTo(x+18,y+54); ctx.lineTo(x+30,y+68);
    ctx.stroke();
    ctx.strokeStyle='#cc1111';
    ctx.beginPath();
    ctx.moveTo(x+12,y+10); ctx.lineTo(x+16,y+14);
    ctx.moveTo(x+16,y+10); ctx.lineTo(x+12,y+14);
    ctx.moveTo(x+20,y+10); ctx.lineTo(x+24,y+14);
    ctx.moveTo(x+24,y+10); ctx.lineTo(x+20,y+14);
    ctx.stroke();
    return;
  }
  ctx.fillStyle='#f3d5b6'; ctx.fillRect(x+8,y+4,18,18);
  ctx.fillStyle='#df3d52'; ctx.fillRect(x+4,y,26,8);
  ctx.fillStyle='#3258d3'; ctx.fillRect(x+4,y+22,26,34);
  ctx.fillStyle='#1f3da3'; ctx.fillRect(x-2,y+28,8,10); ctx.fillRect(x+28,y+28,8,10);
  ctx.fillStyle='#f05f96'; ctx.fillRect(x+7,y+56,8,20); ctx.fillRect(x+19,y+56,8,20);
  ctx.fillStyle='#111'; ctx.fillRect(x+5,y+76,11,5); ctx.fillRect(x+18,y+76,11,5);
}

function drawParamBox(x, y, w, h, label, value, active){
  ctx.fillStyle = active ? 'rgba(255,217,106,.28)' : 'rgba(10,20,50,.26)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = active ? 'rgba(255,217,106,.95)' : 'rgba(255,255,255,.24)';
  ctx.lineWidth = active ? 3 : 1.5;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = '#fff';
  ctx.font = '16px Arial';
  ctx.fillText(label, x + 12, y + 23);
  ctx.font = 'bold 28px Arial';
  ctx.fillText(value, x + 12, y + 55);
}

function drawScene(){
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#7cb4ee');
  g.addColorStop(1,'#dff0ff');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawCloud(130 - state.cameraX*0.08, 95, 1);
  drawCloud(430 - state.cameraX*0.10, 145, 0.85);
  drawCloud(860 - state.cameraX*0.07, 90, 1.05);
  drawCloud(1180 - state.cameraX*0.09, 140, 0.9);

  for(let i=0;i<8;i++){
    const x = i*220 - (state.cameraX*0.35 % 1760);
    ctx.fillStyle='#98c37d';
    ctx.beginPath();
    ctx.moveTo(x, state.groundY+40);
    ctx.quadraticCurveTo(x+110, state.groundY-80-(i%2)*20, x+220, state.groundY+40);
    ctx.closePath();
    ctx.fill();
  }

  ctx.fillStyle='#79af56';
  ctx.fillRect(0,state.groundY+20,canvas.width,16);
  for(let i=0;i<34;i++){
    const x = i*60 - (state.cameraX % 60);
    ctx.fillStyle = i%2===0 ? '#b88b61' : '#a37149';
    ctx.fillRect(x,state.groundY+36,58,104);
  }

  ctx.fillStyle='#111';
  ctx.font='bold 24px Arial';
  ctx.fillText('Start', 42 - state.cameraX, state.groundY+10);

  const fx = state.worldLength - 180 - state.cameraX;
  ctx.strokeStyle='#333';
  ctx.lineWidth=6;
  ctx.beginPath();
  ctx.moveTo(fx,state.groundY+36);
  ctx.lineTo(fx,state.groundY-140);
  ctx.stroke();
  ctx.fillStyle='#ff4e78';
  ctx.beginPath();
  ctx.moveTo(fx,state.groundY-138);
  ctx.lineTo(fx+78,state.groundY-110);
  ctx.lineTo(fx,state.groundY-82);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle='#111';
  ctx.font='bold 30px Arial';
  ctx.fillText('FINISH', fx-36, state.groundY-158);

  const barX=160, barY=24, barW=960, barH=22;
  ctx.fillStyle='rgba(10,20,50,.25)';
  ctx.fillRect(barX,barY,barW,barH);
  ctx.strokeStyle='rgba(255,255,255,.35)';
  ctx.strokeRect(barX,barY,barW,barH);
  ctx.fillStyle='#8fffad';
  ctx.fillRect(barX,barY,Math.max(0, Math.min(barW, state.progress/state.worldLength*barW)),barH);
  ctx.fillStyle='#122';
  ctx.font='bold 16px Arial';
  ctx.fillText('Progress', barX+8, barY+16);

  drawParamBox(24, 24, 120, 72, '1  N', String(state.N), state.selected===1);
  drawParamBox(24, 106, 120, 72, '2  Q/κ', state.q.toFixed(1), state.selected===2);
  drawParamBox(24, 188, 120, 72, '3  β/κ', state.beta.toFixed(1), state.selected===3);
  drawParamBox(24, 270, 120, 72, '4  T₀', String(state.T0), state.selected===4);

  ctx.fillStyle='rgba(10,20,50,.28)';
  ctx.fillRect(320,58,640,44);
  ctx.strokeStyle='rgba(255,255,255,.24)';
  ctx.strokeRect(320,58,640,44);
  ctx.fillStyle = fitColor();
  ctx.font='bold 24px Arial';
  ctx.fillText(overflow() ? 'OVERFLOW RISK' : fitLabel(), 348, 87);

  ctx.fillStyle='rgba(10,20,50,.28)';
  ctx.fillRect(320,110,820,40);
  ctx.strokeStyle='rgba(255,255,255,.24)';
  ctx.strokeRect(320,110,820,40);
  ctx.fillStyle='#fff';
  ctx.font='20px Arial';
  ctx.fillText(state.status, 344, 136);

  if(state.screen==='intro'){
    ctx.fillStyle='rgba(8,14,42,.28)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='rgba(13,24,78,.92)';
    ctx.fillRect(220,140,840,220);
    ctx.strokeStyle='rgba(255,255,255,.28)';
    ctx.lineWidth=2;
    ctx.strokeRect(220,140,840,220);
    ctx.fillStyle='#fff';
    ctx.font='bold 38px Arial';
    ctx.fillText('Heat Conduction Runner', 420, 195);
    ctx.font='24px Arial';
    ctx.fillText('Press 1 for N, 2 for Q/κ, 3 for β/κ, 4 for T₀ (in degrees Celcius).', 260, 245);
    ctx.fillText('Use Left and Right arrows to change values.', 320, 282);
    ctx.fillText('If N becomes too large, overflow happens and the runner dies.', 272, 319);
    ctx.fillStyle='#8fffad';
    ctx.font='bold 28px Arial';
    ctx.fillText('Press Enter to start', 500, 352);
  }

  const drawX = 170;
  drawRunner(drawX, state.groundY-76, state.dead);

  if(state.screen==='dead'){
    ctx.fillStyle='rgba(8,14,42,.25)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='rgba(13,24,78,.92)';
    ctx.fillRect(360,170,560,130);
    ctx.strokeStyle='rgba(255,255,255,.28)';
    ctx.strokeRect(360,170,560,130);
    ctx.fillStyle='#ff8f8f';
    ctx.font='bold 34px Arial';
    ctx.fillText('Overflow', 575, 220);
    ctx.fillStyle='#fff';
    ctx.font='24px Arial';
    ctx.fillText('Too many basis functions. Press R to reset.', 415, 262);
  }

  if(state.screen==='win'){
    ctx.fillStyle='rgba(8,14,42,.22)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='rgba(13,24,78,.92)';
    ctx.fillRect(330,160,620,140);
    ctx.strokeStyle='rgba(255,255,255,.28)';
    ctx.strokeRect(330,160,620,140);
    ctx.fillStyle='#8fffad';
    ctx.font='bold 34px Arial';
    ctx.fillText('Finish reached', 520, 215);
    ctx.fillStyle='#fff';
    ctx.font='24px Arial';
    ctx.fillText('Press R to try another parameter combination.', 390, 258);
  }
}

function tick(){
  if(state.screen==='playing'){
    if(overflow()){
      state.dead = true;
      state.screen = 'dead';
      state.status = 'Overflow: N is too high.';
      playOverflow();
    } else {
      state.progress += speedFactor();
      state.runnerX = 120 + state.progress;
      state.cameraX = Math.max(0, state.runnerX - 180);
      state.status = `Selected ${['N','Q/κ','β/κ','T₀'][state.selected-1]} (use ← → to adjust)`;
      if(state.runnerX >= state.worldLength - 180){
        state.finish = true;
        state.screen = 'win';
        state.status = 'Finish reached.';
        playWin();
      }
    }
  }
  drawScene();
  requestAnimationFrame(tick);
}

resetGame();
requestAnimationFrame(tick);
</script>
</body>
</html>
